<!DOCTYPE html>
<html class="page" lang="ru">
  <head>
    <meta charset="UTF-8">
    <title>Cat Energy</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="styles/styles.css" rel="stylesheet">
    <script src="scripts/index.js" defer></script>
  </head>
  <body class="page__body">
    <header class="header">
      <div class="header__wrapper container">
        <a class="header__logo" href="#">
          <img class="header__logo-image" src="#" width="190" height="38" alt="Логотип Cat Energy">
        </a>

        <button class="header__toggle" type="button">
          <span class="visually-hidden">Открыть меню</span>
        </button>

        <nav class="header__nav main-nav">
          <ul class="main-nav__list">
            <li class="main-nav__item">
              <a class="main-nav__link main-nav__link--current" href="#">Главная</a>
            </li>
            <li class="main-nav__item">
              <a class="main-nav__link" href="#">Каталог продукции</a>
            </li>
            <li class="main-nav__item">
              <a class="main-nav__link" href="#">Подбор программы</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="main">
      <section class="hero">
        <div class="container">
          <h1 class="hero__title">Функциональное питание для котов</h1>
          <p class="hero__text">Занялся собой? Займись котом!</p>
          <img class="hero__image" src="#" width="280" height="270" alt="Одноразовый стакан с питанием для котов">
          <button class="hero__button button button--primary" type="button">
            Подобрать программу
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
